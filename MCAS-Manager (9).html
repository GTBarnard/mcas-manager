function $(id) { return document.getElementById(id); }
function today() { return new Date().toISOString().split('T')[0]; }
function todayStr() { return new Date().toDateString(); }
function fmtD(d) { try { return new Date(d + 'T12:00').toLocaleDateString('en-US', {month:'short', day:'numeric'}); } catch(e) { return d; } }

function E(tag, p, kids) {
  p = p || {};
  kids = kids || [];
  var e = document.createElement(tag);
  var k;
  for (k in p) {
    var v = p[k];
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') {
      var sk;
      for (sk in v) e.style[sk] = v[sk];
    }
    else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e[k] = v;
  }
  if (!Array.isArray(kids)) kids = [kids];
  kids.forEach(function(c) {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function pill(t, col) {
  var e = E('span', {cls:'pill'});
  e.textContent = t;
  e.style.background = col + '20';
  e.style.color = col;
  e.style.border = '1px solid ' + col + '44';
  return e;
}

function card(bg) {
  var e = E('div', {cls:'card'});
  if (bg) e.style.background = bg;
  return e;
}

function mkBtn(t, cls, fn) {
  var b = E('button', {cls:'btn ' + cls});
  b.textContent = t;
  b.onclick = fn || function(){};
  return b;
}

function fld(lbl, inp) {
  var w = E('div', {cls:'fg'});
  if (lbl) w.appendChild(E('label', {cls:'fl'}, [lbl]));
  w.appendChild(inp);
  return w;
}

function stitle(icon, title, sub) {
  var w = E('div');
  var r = E('div', {style:{display:'flex',alignItems:'center',gap:'9px',marginBottom:sub?'4px':'18px'}});
  var ic = E('div', {style:{width:'36px',height:'36px',borderRadius:'11px',background:'rgba(45,140,122,.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'19px',flexShrink:'0'}}, [icon]);
  r.appendChild(ic);
  r.appendChild(E('h2', {style:{fontSize:'20px',fontWeight:'600',color:'#2a2520',lineHeight:'1.1'}}, [title]));
  w.appendChild(r);
  if (sub) w.appendChild(E('p', {style:{color:'#9d9088',fontSize:'12px',marginLeft:'45px',lineHeight:'1.5',marginBottom:'16px'}}, [sub]));
  return w;
}

function rbar(val, onch, col) {
  var w = E('div', {cls:'rat'});
  var i;
  for (i = 1; i <= 10; i++) {
    (function(n) {
      var cls = 'rb';
      if (val >= n) cls += ' ' + col;
      var b = E('button', {cls:cls}, [String(n)]);
      b.onclick = function() {
        onch(n);
        var btns = w.querySelectorAll('.rb');
        var j;
        for (j = 0; j < btns.length; j++) {
          btns[j].className = 'rb' + (n >= j + 1 ? ' ' + col : '');
        }
      };
      w.appendChild(b);
    })(i);
  }
  return w;
}

  var n1 = $('nr1');

  n1.innerHTML = '';
  n2.innerHTML = '';
  var i;
  for (i = 0; i < TABS.length; i++) {
    (function(t, idx) {
      var b = E('button', {cls:'nb' + (t.id === curTab ? ' on' : '')});
      b.innerHTML = '<span class="ni">' + t.icon + '</span><span class="nl">' + t.label + '</span>';

function exportData() {
  var data = {
    cl: LS.get('cl', []),
    logs: LS.get('logs', []),
    avoid: LS.get('avoid', []),
    safe: LS.get('safe', []),
    meds: LS.get('meds', []),
    supps: LS.get('supps', []),
    tests: LS.get('tests', []),
    doctors: LS.get('doctors', []),
    docRecs: LS.get('docRecs', []),
    env: LS.get('env', []),
    meals: LS.get('meals', []),
    grocery: LS.get('grocery', []),
    exported: new Date().toISOString()
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'MCAS-Backup-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var keys = ['cl','logs','avoid','safe','meds','supps','tests','doctors','docRecs','env','meals','grocery'];
      keys.forEach(function(k) {
        if (data[k]) LS.set(k, data[k]);
      });
      alert('Data imported successfully! Your app has been updated.');
      go('home');
    } catch(err) {
      alert('Import failed - please make sure you selected a valid MCAS backup file.');
    }
  };
  reader.readAsText(file);
}

        row.appendChild(num); row.appendChild(inf); mc.appendChild(row);

function showTryModal(p, onSave) {
  var rating = p.rating || 0;
  var reaction = p.reaction || '';
  var notes = p.notes || '';
  var newStatus = p.status;

  var overlay = E('div', {cls:'modal'});
  var box = E('div', {cls:'mbox'});
  box.appendChild(E('p', {style:{fontSize:'15px',fontWeight:'600',marginBottom:'4px'}}, ['How did it work?']));
  box.appendChild(E('p', {style:{fontSize:'12px',color:'#9d9088',marginBottom:'12px'}}, [p.name]));

  // Status selector
  box.appendChild(E('label', {cls:'fl'}, ['How did it work for you?']));
  var statusRow = E('div', {style:{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'12px'}});
  ['Works Great','Works OK','Reaction','Not for me'].forEach(function(s) {
    var sb = E('button', {style:{borderRadius:'20px',padding:'5px 11px',fontSize:'11px',fontWeight:'600',cursor:'pointer',border:'1.5px solid #e8e0d4',background:s===newStatus?'#2d8c7a':'transparent',color:s===newStatus?'#fff':'#9d9088'}}, [s]);
    sb.onclick = function() {
      newStatus = s;
      statusRow.querySelectorAll('button').forEach(function(b) { b.style.background = 'transparent'; b.style.color = '#9d9088'; });
      sb.style.background = '#2d8c7a'; sb.style.color = '#fff';
    };
    statusRow.appendChild(sb);
  });
  box.appendChild(statusRow);

  // Rating
  box.appendChild(E('label', {cls:'fl'}, ['Rate it 1-10 (1=terrible, 10=love it)']));
  box.appendChild(rbar(rating, function(v) { rating = v; }, 'tl'));

  // Reaction notes
  var ri = E('input', {placeholder:'Any reaction or side effects? Leave blank if none'}); ri.value = reaction; ri.oninput = function(e) { reaction = e.target.value; }; box.appendChild(fld('Reaction', ri));
  var ni = E('textarea', {placeholder:'How does it make you feel? Skin feel? Smell ok? Would you reorder?'}); ni.style.minHeight = '70px'; ni.value = notes; ni.oninput = function(e) { notes = e.target.value; }; box.appendChild(fld('Your Notes', ni));

  var sb2 = mkBtn('Save', 'bt', function() {
    var prods = LS.get('myproducts',[]);
    var tryKey = p.id >= 200 ? 'supplyproducts' : (p.id >= 100 ? 'supplyproducts' : 'myproducts');
    LS.set(tryKey, LS.get(tryKey,[]).map(function(x) {
      if (x.id !== p.id) return x;
      return {id:x.id,cat:x.cat,name:x.name,brand:x.brand,where:x.where,price:x.price,status:newStatus,tried:true,rating:rating,reaction:reaction,notes:notes,reorderWeeks:x.reorderWeeks,reorderAlert:x.reorderAlert,orderedDate:x.orderedDate};
    }));
    document.body.removeChild(overlay);
    onSave();
  });
  sb2.style.marginBottom = '6px'; box.appendChild(sb2);
  var cl = E('button', {style:{width:'100%',background:'transparent',color:'#9d9088',border:'2px solid #e8e0d4',borderRadius:'12px',padding:'10px',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}); cl.textContent = 'Cancel'; cl.onclick = function() { document.body.removeChild(overlay); };
  box.appendChild(cl); overlay.appendChild(box); overlay.onclick = function(e) { if (e.target===overlay) document.body.removeChild(overlay); }; document.body.appendChild(overlay);
}
